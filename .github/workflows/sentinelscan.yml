name: SentinelEliteScan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  sentinel-scan:
    name: Secrets & PAN Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for --git-history mode

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SentinelEliteScan
        run: pip install .

      - name: Run SentinelEliteScan (working tree + git history)
        id: scan
        shell: bash
        run: |
          set -o pipefail
          sentinelscan scan . --git-history --json | tee sentinel-report.json

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sentinel-scan-report
          path: sentinel-report.json
          if-no-files-found: ignore
